[pytest]
# Pytest configuration for MCP Hands-on Lab

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker definitions
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests
    lab1: marks tests specific to Lab 1
    lab2: marks tests specific to Lab 2
    lab3: marks tests specific to Lab 3
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_network: marks tests that require network connectivity
    requires_azure: marks tests that require Azure credentials

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Show extra info
addopts = 
    -v
    --strict-markers
    --tb=short

# Coverage options (if pytest-cov is installed)
# --cov=labs
# --cov-report=html
# --cov-report=term-missing
